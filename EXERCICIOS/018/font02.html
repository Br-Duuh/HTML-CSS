<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'angelia';
            src: url('Angelia Beauty.ttf') format('opentype');
            font-weight: normal;
            font-style: normal;
            /*
                Tipos de Formato()
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Appe Advanced Typography)
                - svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'angelia', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>

<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quo sunt quidem vitae exercitationem rerum ex
        perspiciatis. Molestiae eaque cum cumque, reiciendis delectus, asperiores culpa nihil temporibus neque fugit
        architecto inventore.</p>

</body>

</html>
