<body>
    <h1>Paragrafos e Quebras de linha</h1>
    <hr>
    <p>Você pode escrever um paragrafo de qualquer jeito, basta escrever tudo num par de tags &lt;p&gt; e &lt;/p&gt;

    </p>
    <p>Se quiser quebrar um texto em algum lugar especifico <br> como esse basta usar a tag &lt;br&gt;.

    </p>

    <p>Alguns Simbolos especiais:
        &reg;
        &copy;
        &euro;
        &cent;
        &Delta;
        &delta;
        &larr;
        &uparrow;

    </p>
    <p>
        Agora alguns Emojis:
        &#128517;
        &#128561;
        &#128548;
        &#x1F923;

    </p>
</body>
