<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .surpresa {
            display: none;
        }

        div:hover>.surpresa {
            display: block;
            color: white;
            background-color: black;
            width: 150px;
        }

        div:hover {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Exemplo de Hover</h1>
    <div>Passe o mouse aqui
        <p class="surpresa">Surpresa!</p>
    <p>Outra coisa.</p>
    </div>

</body>

</html>
