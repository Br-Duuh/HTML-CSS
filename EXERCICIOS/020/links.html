<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
        # ID
        . Class
        : Pseudo-Class
        :: Pseudo-Element
        > Children
        
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: rgb(0, 186, 6);
        }

        a:hover {
            text-decoration: underline;
            color: black;
        }

        a:active {
            color: green;
        }

        .ytb {
            background-color: rgb(255, 68, 68);
        }

        /* after ou before */
        .ytb::after {
            content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color: rgb(0, 0, 0);
        }
    </style>
</head>

<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="http://www.github.com.br/" target="_blank">GitHub</a></li>
        <li><a href="http://www.youtube.com.br/" target="_blank" class="ytb">Youtube</a></li>
        <li><a href="http://www.google.com.br/" target="_blank">Google</a></li>
    </ul>

</body>

</html>
