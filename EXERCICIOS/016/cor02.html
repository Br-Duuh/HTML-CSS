<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*Configurações Globais da CSS*/
            height: 100%;
        }
        body {
            background-image: linear-gradient(135deg, #555358, #5F6062, #7B7263 30%,#D9E5D6 );
            /* "radial-gradiente" circle,square,*/
            /* "linear-gradiente" left,top,right,bottom, ou usar deg(Graus)*/
            color: white;
            background-attachment: fixed;
        }
    </style>
</head>

<body>
    <h1>Testando Gradriente</h1>

</body>

</html>
