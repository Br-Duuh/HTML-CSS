<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEOS EM HTML5</title>
</head>

<body>
    <H1>Vídeos em HML5</H1>
    <P>Este video é hospedado no meu próprio servidor</P>
    <!--o ideal é fazer igual é feito com o audio, com vários arquivos pra exibir em caso de falha do anterior-->
    <video width="500" controls loop poster="imagem/imagemM.png">
        <source src="videos/fosforo.mp4" type="video/mp4">
        <p>Seu navegador Não tem compatibilidade com reprodução de videos.</p>
    </video>

    <h1>Inserindo Vídeos do youtube</h1>
    <iframe width="500" height="315" src="https://www.youtube.com/embed/05CPWieCNGg?si=jg3teVDZg6xlkWhA"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
