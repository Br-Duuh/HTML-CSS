<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias HTML5</title>
</head>

<body>
    <h1>Imagem Dinâmica</h1>
    <p>Imagem adaptavel dependendo do despositivo ou zoom</p>

    <picture>
        <source media="(max-width: 500px)" srcset="imagens/imagemP.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/imagemM.png" type="image/png">
        <img src="imagens/imagemG.png" alt="imagem flexível">
    </picture>
    <!--ATENÇÃO, A ORDEM É EXTREMAMENTE IMPORTANTE, ORGANIZAR DA MENOR PARA A MAIOR OU PODE DAR ERRO NO RECONHECIMENTO DAS IMAGENS-->
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5 usando a tag <mark style="background-color: lightblue;">AUDIO</mark>
        <audio src="musicas/blue_mood.mp3" controls autoplay></audio>
        <!--SUPORTA APENAS ESTES FORMATOS MP3 WAV OGG-->
        <audio preload="metadata" autoplay  controls loop>
            <source src="musicas/blue_mood.mp3" type="audio/mpeg">
            <source src="musicas/blue_mood.ogg" type="audio/ogg">
            <source src="musicas/blue_mood.wav" type="audio/wav">
            <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="musicas/blue_mood.mp3" download="blue_mood.mp3">Cllick aqui para baixar o aquivo</a></p>
        </audio>
        <!--"preload" auto e none faz com que demore mais o carregamento do site, recomendado o "metadata" que carrega algumas informações e "libera" o site-->
    </p>
</body>

</html>
