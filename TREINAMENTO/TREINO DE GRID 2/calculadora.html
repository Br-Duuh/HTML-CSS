<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculadora">
        <input class="display"/>
        <button class="cinza">AC</button>
        <button class="cinza">+/-</button>
        <button class="azul">/</button>
        <button class="azul">*</button>
        <button class="preto">7</button>
        <button class="preto">8</button>
        <button class="preto">9</button>
        <button class="azul">-</button>
        <button class="preto">4</button>
        <button class="preto">5</button>
        <button class="preto">6</button>
        <button class="azul">+</button>
        <button class="preto">1</button>
        <button class="preto">2</button>
        <button class="preto">3</button>
        <button class="igual">=</button>
        <button class="preto zero">0</button>
        <button class="preto">,</button>



    </div>
    
</body>
</html>
